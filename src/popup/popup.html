<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 16px; color: #333; }
    h1 { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    h1 span { color: #065fd4; }
    .section { margin-bottom: 16px; }
    .section h2 { font-size: 13px; color: #606060; margin-bottom: 8px; }
    .video-info { background: #f8f9fa; padding: 10px; border-radius: 8px; font-size: 13px; }
    .video-info .title { font-weight: 600; margin-bottom: 4px; }
    .video-info .vid { font-size: 11px; color: #999; }
    .no-video { color: #999; font-size: 13px; font-style: italic; }
    .recent-list { list-style: none; }
    .recent-list li { padding: 6px 0; border-bottom: 1px solid #eee; font-size: 12px; }
    .recent-list li:last-child { border-bottom: none; }
    .recent-list a { color: #065fd4; text-decoration: none; }
    .recent-list a:hover { text-decoration: underline; }
    .links { display: flex; gap: 8px; }
    .links a {
      display: inline-block; padding: 6px 14px; background: #f2f2f2; border-radius: 14px;
      font-size: 12px; color: #333; text-decoration: none;
    }
    .links a:hover { background: #e5e5e5; }
    .api-status { font-size: 11px; color: #999; margin-top: 8px; }
    .api-status .ok { color: #1a7f37; }
    .api-status .missing { color: #d32f2f; }
  </style>
</head>
<body>
  <h1><span>YT</span> Article Generator</h1>

  <div class="section">
    <h2>現在の動画</h2>
    <div id="video-info" class="no-video">YouTubeの動画ページを開いてください</div>
  </div>

  <div class="section">
    <h2>最近の記事</h2>
    <ul id="recent-list" class="recent-list">
      <li style="color:#999;">まだ記事がありません</li>
    </ul>
  </div>

  <div class="section">
    <div class="links">
      <a href="#" id="openOptions">設定</a>
      <a href="#" id="openGithub">GitHub LIFE</a>
    </div>
  </div>

  <div class="api-status" id="api-status"></div>

  <script src="popup.js"></script>
</body>
</html>
